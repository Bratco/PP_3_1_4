<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${user.id == null ? 'Create User' : 'Edit User'}">User Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .card-header {
            background-color: #0d6efd;
            color: white;
        }
        .role-badge {
            background-color: #6c757d;
            color: white;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            display: inline-block;
            margin: 2px;
        }
        .role-badge-admin {
            background-color: #0d6efd;
        }
        .role-badge-user {
            background-color: #198754;
        }
    </style>
</head>
<body>

<!-- Navigation Bar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">
            <i class="fas fa-user-shield me-2"></i>Admin Panel
        </span>
        <div class="d-flex align-items-center text-white">
            <span class="me-3" sec:authentication="name"></span>
            <span th:each="role : ${#authentication.getAuthorities()}"
                  th:classappend="${role == 'ROLE_ADMIN' ? 'role-badge-admin' : 'role-badge-user'}"
                  class="role-badge me-1"
                  th:text="${role == 'ROLE_ADMIN' ? 'ADMIN' : 'USER'}"></span>
            <form th:action="@{/logout}" method="post" class="ms-3">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-danger btn-sm">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <i class="fas" th:classappend="${user.id == null ? 'fa-user-plus' : 'fa-edit'}"></i>
                    <span th:text="${user.id == null ? 'Create New User' : 'Edit User'}"></span>
                </div>
                <div class="card-body">
                    <form th:action="@{${user.id == null ? '/admin/add' : '/admin/update/' + user.id}}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="id" th:value="${user.id}" th:if="${user.id != null}"/>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">First Name</label>
                                <input type="text" class="form-control" name="name" th:value="${user.name}" placeholder="First Name" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Last Name</label>
                                <input type="text" class="form-control" name="lastName" placeholder="Last Name">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Age</label>
                                <input type="number" class="form-control" name="age" th:value="${user.age}" placeholder="Age">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" name="email" th:value="${user.email}" placeholder="Email">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Username</label>
                                <input type="text" class="form-control" name="username" th:value="${user.username}" placeholder="Username" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" name="password" th:required="${user.id == null}" placeholder="Password">
                                <small th:if="${user.id != null}" class="text-muted">Leave blank to keep current password</small>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Roles</label>
                            <div class="border rounded p-3">
                                <div th:each="role : ${allRoles}" class="form-check">
                                    <input type="checkbox"
                                           class="form-check-input"
                                           name="roleIds"
                                           th:value="${role.id}"
                                           th:checked="${user.roles != null and user.roles.contains(role)}"
                                           th:id="'role_' + ${role.id}">
                                    <label class="form-check-label" th:for="'role_' + ${role.id}">
                                        <span th:classappend="${role.name == 'ROLE_ADMIN' ? 'role-badge-admin' : 'role-badge-user'}"
                                              class="role-badge"
                                              th:text="${role.name == 'ROLE_ADMIN' ? 'ADMIN' : 'USER'}"></span>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a th:href="@{/admin}" class="btn btn-secondary">
                                <i class="fas fa-times"></i> Close
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> <span th:text="${user.id == null ? 'Create' : 'Update'}">Save</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
