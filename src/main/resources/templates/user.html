<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>User Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .card-header {
            background-color: #198754;
            color: white;
        }
        .role-badge {
            background-color: #6c757d;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            display: inline-block;
            margin: 3px;
        }
        .role-badge-user {
            background-color: #198754;
        }
        .info-label {
            font-weight: bold;
            color: #495057;
        }
        .logout-btn {
            background-color: #dc3545;
            border: none;
        }
        .logout-btn:hover {
            background-color: #b02a37;
        }
    </style>
</head>
<body>

<!-- Navigation Bar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">
            <i class="fas fa-user me-2"></i>User Information Page
        </span>
        <div class="d-flex align-items-center text-white">
            <span class="me-3" sec:authentication="name"></span>
            <span th:each="role : ${#authentication.getAuthorities()}"
                  class="role-badge role-badge-user me-1"
                  th:text="${role == 'ROLE_ADMIN' ? 'ADMIN' : 'USER'}"></span>
            <form th:action="@{/logout}" method="post" class="ms-3">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-danger btn-sm logout-btn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header">
                    <i class="fas fa-id-card me-2"></i>About User
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-bordered">
                            <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>First Name</th>
                                <th>Last Name</th>
                                <th>Age</th>
                                <th>Email</th>
                                <th>Role</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr>
                                <td th:text="${user.id}">1</td>
                                <td>
                                    <span th:text="${user.name != null ? user.name.split(' ')[0] : user.username}"></span>
                                </td>
                                <td>
                                    <span th:text="${user.name != null && user.name.contains(' ') ? user.name.split(' ')[1] : ''}"></span>
                                </td>
                                <td th:text="${user.age}">25</td>
                                <td th:text="${user.email}">user@example.com</td>
                                <td>
                                        <span th:each="role : ${user.roles}"
                                              class="role-badge role-badge-user"
                                              th:text="${role.name == 'ROLE_ADMIN' ? 'ADMIN' : 'USER'}"></span>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
