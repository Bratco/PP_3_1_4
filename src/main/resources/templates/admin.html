<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Admin Panel - Dynamic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card-header { background-color: #0d6efd; color: white; font-weight: bold; }
        .table thead th { background-color: #0d6efd; color: white; }
        .btn-edit { background-color: #0dcaf0; color: white; margin-right: 5px; }
        .btn-edit:hover { background-color: #0aa5c6; color: white; }
        .btn-delete { background-color: #dc3545; color: white; }
        .role-badge { background-color: #6c757d; color: white; padding: 3px 8px; border-radius: 12px; font-size: 0.75rem; display: inline-block; margin: 2px; }
        .role-badge-admin { background-color: #0d6efd; }
        .role-badge-user { background-color: #198754; }
        .logout-btn { background-color: #dc3545; border: none; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand"><i class="fas fa-user-shield me-2"></i>Admin Panel</span>
        <div class="d-flex align-items-center text-white">
            <span class="me-3" sec:authentication="name"></span>
            <span th:each="role : ${#authentication.getAuthorities()}" class="role-badge role-badge-admin me-1" th:text="${role}"></span>
            <form th:action="@{/logout}" method="post" class="ms-3">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-danger btn-sm logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="alert alert-info"><i class="fas fa-info-circle"></i> Welcome, <strong sec:authentication="name"></strong>! You have administrator privileges.</div>

    <div class="mb-3 text-end">
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#userModal" onclick="openAddModal()">
            <i class="fas fa-user-plus"></i> Add New User
        </button>
    </div>

    <div class="card">
        <div class="card-header"><i class="fas fa-users me-2"></i>All Users</div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped table-hover mb-0">
                    <thead>
                    <tr><th>ID</th><th>Name</th><th>Age</th><th>Email</th><th>Role</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="modalTitle">Add User</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="userForm">
                    <input type="hidden" id="userId">
                    <div class="mb-3"><label>Username</label><input type="text" id="username" class="form-control" required></div>
                    <div class="mb-3"><label>Password</label><input type="password" id="password" class="form-control" placeholder="Leave blank to keep unchanged (for edit)"></div>
                    <div class="mb-3"><label>Full Name</label><input type="text" id="name" class="form-control" required></div>
                    <div class="mb-3"><label>Age</label><input type="number" id="age" class="form-control"></div>
                    <div class="mb-3"><label>Email</label><input type="email" id="email" class="form-control"></div>
                    <div class="mb-3"><label>Roles</label><br><div id="rolesCheckboxes"></div></div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveUser()">Save</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // CSRF функции
    function getCsrfToken() {
        const meta = document.querySelector('meta[name="_csrf"]');
        return meta ? meta.getAttribute('content') : '';
    }
    function getCsrfHeader() {
        const meta = document.querySelector('meta[name="_csrf_header"]');
        return meta ? meta.getAttribute('content') : 'X-CSRF-TOKEN';
    }
    async function fetchWithCsrf(url, options = {}) {
        const csrfToken = getCsrfToken();
        const csrfHeader = getCsrfHeader();
        const headers = options.headers || {};
        headers[csrfHeader] = csrfToken;
        if (!headers['Content-Type'] && !(options.body instanceof FormData)) {
            headers['Content-Type'] = 'application/json';
        }
        return fetch(url, { ...options, headers });
    }

    let allRoles = [];

    async function loadUsers() {
        try {
            const response = await fetchWithCsrf('/api/users', { method: 'GET' });
            if (!response.ok) throw new Error('Failed to load users');
            const users = await response.json();
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = '';
            for (let user of users) {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = user.id;
                row.insertCell(1).innerText = user.name || user.username;
                row.insertCell(2).innerText = user.age || '';
                row.insertCell(3).innerText = user.email || '';
                const roleCell = row.insertCell(4);
                if (user.roles && user.roles.length) {
                    user.roles.forEach(role => {
                        const badge = document.createElement('span');
                        badge.className = `role-badge ${role.name === 'ROLE_ADMIN' ? 'role-badge-admin' : 'role-badge-user'}`;
                        badge.innerText = role.name === 'ROLE_ADMIN' ? 'ADMIN' : 'USER';
                        roleCell.appendChild(badge);
                    });
                } else roleCell.innerText = '-';
                const actionsCell = row.insertCell(5);
                const editBtn = document.createElement('button');
                editBtn.className = 'btn btn-edit btn-sm me-1';
                editBtn.innerHTML = '<i class="fas fa-edit"></i> Edit';
                editBtn.onclick = () => openEditModal(user);
                const delBtn = document.createElement('button');
                delBtn.className = 'btn btn-delete btn-sm';
                delBtn.innerHTML = '<i class="fas fa-trash"></i> Delete';
                delBtn.onclick = () => deleteUser(user.id);
                actionsCell.appendChild(editBtn);
                actionsCell.appendChild(delBtn);
            }
        } catch (error) { console.error(error); alert('Could not load users.'); }
    }

    async function loadRoles() {
        try {
            const response = await fetchWithCsrf('/api/roles', { method: 'GET' });
            if (!response.ok) throw new Error('Failed to load roles');
            allRoles = await response.json();
            const container = document.getElementById('rolesCheckboxes');
            container.innerHTML = '';
            allRoles.forEach(role => {
                const div = document.createElement('div');
                div.className = 'form-check';
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.className = 'form-check-input';
                cb.value = role.id;
                cb.id = `role_${role.id}`;
                const label = document.createElement('label');
                label.className = 'form-check-label';
                label.htmlFor = `role_${role.id}`;
                label.innerText = role.name === 'ROLE_ADMIN' ? 'ADMIN' : 'USER';
                div.appendChild(cb);
                div.appendChild(label);
                container.appendChild(div);
            });
        } catch (error) { console.error(error); alert('Could not load roles.'); }
    }

    function openAddModal() {
        document.getElementById('modalTitle').innerText = 'Add User';
        document.getElementById('userForm').reset();
        document.getElementById('userId').value = '';
        document.getElementById('password').required = true;
        document.getElementById('password').placeholder = 'Password (required)';
        document.querySelectorAll('#rolesCheckboxes input').forEach(cb => cb.checked = false);
        new bootstrap.Modal(document.getElementById('userModal')).show();
    }

    function openEditModal(user) {
        document.getElementById('modalTitle').innerText = 'Edit User';
        document.getElementById('userId').value = user.id;
        document.getElementById('username').value = user.username;
        document.getElementById('name').value = user.name || '';
        document.getElementById('age').value = user.age || '';
        document.getElementById('email').value = user.email || '';
        document.getElementById('password').value = '';
        document.getElementById('password').required = false;
        document.getElementById('password').placeholder = 'Leave blank to keep current password';
        const userRoleIds = user.roles ? user.roles.map(r => r.id) : [];
        document.querySelectorAll('#rolesCheckboxes input').forEach(cb => {
            cb.checked = userRoleIds.includes(parseInt(cb.value));
        });
        new bootstrap.Modal(document.getElementById('userModal')).show();
    }

    // ИСПРАВЛЕННАЯ ФУНКЦИЯ SAVEUSER
    async function saveUser() {
        const id = document.getElementById('userId').value;
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const name = document.getElementById('name').value.trim();
        const age = document.getElementById('age').value ? parseInt(document.getElementById('age').value) : null;
        const email = document.getElementById('email').value.trim() || null;
        const roleIds = Array.from(document.querySelectorAll('#rolesCheckboxes input:checked')).map(cb => parseInt(cb.value));

        if (!username) { alert('Username is required'); return; }
        if (!id && !password) { alert('Password is required for new user'); return; }

        const payload = { username, password, name, age, email, roleIds };
        const url = id ? `/api/users/${id}` : '/api/users';
        const method = id ? 'PUT' : 'POST';

        try {
            const response = await fetchWithCsrf(url, { method, body: JSON.stringify(payload) });
            if (response.ok) {
                // Закрываем модалку
                const modalElement = document.getElementById('userModal');
                const modal = bootstrap.Modal.getInstance(modalElement);
                if (modal) modal.hide();
                // Принудительно удаляем оверлей (на случай, если остался)
                document.querySelectorAll('.modal-backdrop').forEach(el => el.remove());
                document.body.classList.remove('modal-open');
                document.body.style.overflow = '';
                // Обновляем таблицу
                await loadUsers();
            } else {
                const errorText = await response.text();
                alert('Error: ' + errorText);
            }
        } catch (error) {
            console.error('Save error:', error);
            alert('Network error while saving user');
            // Убираем оверлей при ошибке, если он вдруг появился
            document.querySelectorAll('.modal-backdrop').forEach(el => el.remove());
            document.body.classList.remove('modal-open');
            document.body.style.overflow = '';
        }
    }

    async function deleteUser(id) {
        if (!confirm('Delete this user?')) return;
        try {
            const response = await fetchWithCsrf(`/api/users/${id}`, { method: 'DELETE' });
            if (response.ok) await loadUsers();
            else alert('Delete failed: ' + await response.text());
        } catch (error) { console.error(error); alert('Network error while deleting user'); }
    }

    window.onload = async () => {
        await loadRoles();
        await loadUsers();
    };
</script>
</body>
</html>
